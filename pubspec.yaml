name: app
description: "E2EE Chat Application with Signal-like protocol"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Cryptography: Ed25519, X25519, XChaCha20-Poly1305, HKDF, SHA-256
  cryptography: ^2.7.0
  # Secure storage: Android Keystore / iOS Keychain
  flutter_secure_storage: ^9.2.4
  # WebSocket client for real-time messaging
  web_socket_channel: ^3.0.2
  # HTTP client for REST API calls
  http: ^1.3.0
  # State management
  provider: ^6.1.5
  # Date formatting
  intl: ^0.20.2
  # Session persistence
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
